# Pulumi pre-commit hooks (merged with common hooks).
repos:
  - repo: local
    hooks:
      - id: pulumi-validate
        name: Pulumi Validate
        entry: pulumi validate
        language: system
        files: Pulumi\.(yaml|yml)$
        pass_filenames: false

      - id: pulumi-preview
        name: Pulumi Preview
        entry: pulumi preview --diff
        language: system
        files: \.(ts|js|py|go)$
        pass_filenames: false
        always_run: false
